<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Cadastro de Membros<br>Life Group Revival Street</h1>

    <form id="formCadastro">

        <input type="text" id="nome" placeholder="Nome Completo" required>

        <input type="date" id="nascimento" required>

        <input type="text" id="endereco" placeholder="Endereço Completo" required>

        <input type="text" id="cep" placeholder="CEP" required>

        <input type="email" id="email" placeholder="E-mail" required>

        <input type="tel" id="telefonePessoal" placeholder="Telefone Pessoal com DDD" required>

        <input type="text" id="contatoEmergencia" placeholder="Contato de Emergência" required>

        <input type="tel" id="telefoneEmergencia" placeholder="Telefone de Emergência com DDD" required>

        <h3>Cursos Realizados</h3>

        <select id="acompanhamentoInicial" required>
            <option value="acompanhamentoInicial">Acompanhamento Inicial</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <select id="novaCriatura" required>
            <option value="novaCriatura">Nova Criatura</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <select id="dna1" required>
            <option value="dna1"> Estação DNA 1</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <select id="dna2" required>
            <option value="dna2">Estação DNA 2</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <select id="expresso1" required>
            <option value="expresso1">Expresso 1</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <select id="expresso2" required>
            <option value="expresso2">Expresso 2</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
        </select>

        <h3>Perguntas Gerais</h3>

        <select id="pizzaPastor" required>
            <option value="pizzaPastor">Já participou da pizza com o pastor?</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="voluntario" required>
            <option value="voluntario">Já é voluntário(a)?</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="batizado" required>
            <option value="batizado">Já é batizado(a)?</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="encontroDeus" required>
            <option value="encontroDeus">Já passou pelo encontro com Deus?</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="volts" required>
            <option value="volts">Já participou do treinamento Volts?</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <button type="submit">Cadastrar</button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("CuNuLrIjYRxud_ZFB");
</script>

<script src="script.js"></script>

</body>
</html>
