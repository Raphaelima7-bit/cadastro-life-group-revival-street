<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Cadastro de Membros<br>Life Group Revival Street</h1>

    <form id="formCadastro">

        <input type="text" id="nome" placeholder="Nome Completo" required>

        <input 
            type="text"
            id="nascimento"
            placeholder="Data de Nascimento"
            maxlength="10"
            required
        >

        <input type="text" id="endereco" placeholder="Endereço (Rua/Av., etc.)" required>

        <input type="text" id="numero" placeholder="Número" required>

        <input type="text" id="complemento" placeholder="Complemento">

        <input type="text" id="bairro" placeholder="Bairro" required>

        <input type="text" id="cidade" placeholder="Cidade" required>

        <input type="text" id="cep" placeholder="CEP" required>

        <input type="email" id="email" placeholder="E-mail" required>

        <input type="tel" id="telefonePessoal" placeholder="Telefone Pessoal com DDD" required>

        <input type="text" id="contatoEmergencia" placeholder="Contato de Emergência" required>

        <input type="tel" id="telefoneEmergencia" placeholder="Telefone de Emergência com DDD" required>

        <h3>Cursos Realizados</h3>

        <select id="acompanhamentoInicial" required>

            <option value="" disabled selected>
                Acompanhamento Inicial
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>

        </select>

        <select id="novaCriatura" required>
            
            <option value="" disabled selected>
                Nova Criatura
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>

        </select>

        <select id="dna1" required>

            <option value="" disabled selected>
                Estação DNA 1
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
            
        </select>

        <select id="dna2" required>

            <option value="" disabled selected>
                Estação DNA 2
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
            
        </select>

        <select id="expresso1" required>

            <option value="" disabled selected>
                Expresso 1
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>
            
        </select>

        <select id="expresso2" required>

            <option value="" disabled selected>
                Expresso 2
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
            <option value="Fazendo">Fazendo</option>

        </select>

        <h3>Perguntas Gerais</h3>

        <select id="pizzaPastor" required>
            <option value="" disabled selected>
                Já participou da pizza com o pastor?
            </option>

            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="voluntario" required>

    <option value="" disabled selected>
        Já é voluntário(a)?
    </option>

    <option value="Sim">Sim</option>
    <option value="Não">Não</option>

</select>

<div id="campoMinisterio" style="display: none;">

    <input
        type="text"
        id="ministerio"
        placeholder="Em qual(is) ministério(s) você serve?"
    >

</div>

        <select id="batizado" required>
            <option value="" disabled selected>
                Já é batizado(a)?
                
            </option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="encontroDeus" required>
            <option value="" disabled selected>
                Já passou pelo encontro com Deus?
                
            </option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <select id="volts" required>
            <option value="" disabled selected>
                Já participou do treinamento Volts?

            </option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
        </select>

        <button type="submit">Cadastrar</button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("CuNuLrIjYRxud_ZFB");
</script>

<script src="script.js"></script>

</body>
</html>
